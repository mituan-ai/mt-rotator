name: mt-rotator

x-backend: &backend
  image: mt-rotator-api:local
  build:
    context: ./backend
  env_file: .env
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16.10-alpine
    env_file: .env
    restart: unless-stopped
    shm_size: 256mb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7.4.5-alpine
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "192mb",
        "--maxmemory-policy",
        "noeviction",
      ]
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true

  migrate:
    <<: *backend
    command:
      [
        "sh",
        "-ec",
        "python manage.py migrate --noinput && python manage.py seed_catalog",
      ]
    restart: "no"

  api:
    <<: *backend
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen(urllib.request.Request('http://127.0.0.1:8000/api/v1/health/ready', headers={'X-Forwarded-Proto':'https'}), timeout=5)"
      interval: 15s
      timeout: 8s
      retries: 10
      start_period: 30s

  worker:
    <<: *backend
    command:
      [
        "celery",
        "-A",
        "mt_rotator",
        "worker",
        "--loglevel=INFO",
        "--concurrency=2",
      ]
    depends_on:
      api:
        condition: service_healthy

  beat:
    <<: *backend
    command:
      [
        "celery",
        "-A",
        "mt_rotator",
        "beat",
        "--loglevel=INFO",
        "--schedule=/tmp/celerybeat-schedule",
      ]
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: mt-rotator-web:local
    build:
      context: .
      dockerfile: infra/Caddy.Dockerfile
    env_file: .env
    restart: unless-stopped
    init: true
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate --spider \"$${CADDY_HEALTH_URL:-https://localhost/api/v1/health/live}\""]
      interval: 30s
      timeout: 10s
      retries: 5
    security_opt:
      - no-new-privileges:true

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
