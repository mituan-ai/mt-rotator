name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.10-alpine
        env:
          POSTGRES_DB: mt_rotator
          POSTGRES_USER: mt_rotator
          POSTGRES_PASSWORD: ci-only-database-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mt_rotator -d mt_rotator"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.8"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: uv sync --frozen --all-groups
        working-directory: backend
      - name: Lint and format check
        run: uv run ruff check . && uv run ruff format --check .
        working-directory: backend
      - name: Type check
        run: MT_TESTING=1 uv run mypy apps mt_rotator
        working-directory: backend
      - name: Django checks and migration drift
        run: |
          MT_TESTING=1 uv run python manage.py check
          MT_TESTING=1 uv run python manage.py makemigrations --check --dry-run
        working-directory: backend
      - name: Reject unsafe new migrations
        env:
          DJANGO_SECRET_KEY: ci-only-secret-key
          MT_MIGRATION_LINTING: "true"
          POSTGRES_DB: mt_rotator
          POSTGRES_USER: mt_rotator
          POSTGRES_PASSWORD: ci-only-database-password
          POSTGRES_HOST: 127.0.0.1
        run: >-
          uv run python manage.py lintmigrations
          --ignore-initial-migrations
          --ignore-name
          0002_marketdatabatch_metadata
          0002_alter_user_options_user_unique_user_display_name_ci
          0002_backtestrun_lease
          0003_instrument_advice_eligible_instrument_asset_class_and_more
          0003_advicesnapshot_positionlot_and_more
          --no-cache
        working-directory: backend
      - name: Tests
        run: MT_TESTING=1 uv run pytest --cov=apps --cov-report=term-missing --cov-fail-under=80
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Lint, type check and unit tests
        run: npm run lint && npm run typecheck && npm test
        working-directory: frontend
      - name: Production build
        run: npm run build
        working-directory: frontend

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run e2e
        working-directory: frontend

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Install operational checks
        run: sudo apt-get update && sudo apt-get install --yes restic shellcheck
      - name: Check shell scripts
        run: shellcheck ops/mt-rotator infra/*.sh
      - name: Validate Compose configuration
        run: cp infra/ci.env .env && docker compose config --quiet
      - name: Build backend image
        run: docker build --tag mt-rotator-api:ci backend
      - name: Build web image
        run: docker build --file infra/Caddy.Dockerfile --tag mt-rotator-web:ci .
      - name: Scan backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mt-rotator-api:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - name: Scan web image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mt-rotator-web:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - name: Start the real Compose stack
        run: docker compose up --build -d --wait --wait-timeout 240
      - name: Verify API, proxy and worker
        run: |
          curl --noproxy '*' --fail --silent http://127.0.0.1/api/v1/health/ready
          docker compose exec -T worker celery -A mt_rotator inspect ping --timeout=10
      - name: Create full-stack test administrator
        run: >-
          docker compose exec -T api python manage.py shell -c
          "from apps.accounts.models import User;
          User.objects.create_superuser(email='admin@example.com', display_name='管理员', password='Correct-Horse-Battery-Staple-2026')"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci && npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Run one real full-stack browser workflow
        env:
          E2E_BASE_URL: http://127.0.0.1
        run: npx playwright test e2e/fullstack.spec.ts --project=desktop-chromium
        working-directory: frontend
      - name: Verify backup restoration
        env:
          RESTIC_REPOSITORY: ${{ runner.temp }}/mt-rotator-restic
          RESTIC_PASSWORD: ci-only-restic-password
        run: |
          restic init
          ./ops/mt-rotator backup
          ./ops/mt-rotator restore-verify
      - name: Show container logs after failure
        if: failure()
        run: docker compose logs --no-color

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [backend, frontend, e2e, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish API image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/mituan-ai/mt-rotator-api:${{ github.ref_name }}
            ghcr.io/mituan-ai/mt-rotator-api:sha-${{ github.sha }}
      - name: Build and publish web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Caddy.Dockerfile
          push: true
          tags: |
            ghcr.io/mituan-ai/mt-rotator-web:${{ github.ref_name }}
            ghcr.io/mituan-ai/mt-rotator-web:sha-${{ github.sha }}
